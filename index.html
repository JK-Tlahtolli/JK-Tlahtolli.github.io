<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JK-Tlahtolli</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="banner">
    <img src="imagenes/BannerV1.png" alt="Banner" style="width:100%;height:100%;object-fit:cover;">
  </header>

  <nav class="barra">
    <div class="barra-nav">
      <a href="index.html" class="barra-link">Inicio</a>
      <div class="barra-sep"></div>
      <a href="#historias" class="barra-link">Historias</a>
      <div class="barra-sep"></div>
      <a href="#sagas" class="barra-link">Sagas</a>
    </div>
    <input class="barra-busqueda" type="text" placeholder="Buscar historia..." id="busqueda">
  </nav>

  <section class="carrusel-wrap">
    <div class="carrusel-header">
      <span class="carrusel-titulo">Portadas</span>
      <div class="carrusel-nav">
        <button class="nav-btn" id="prev" aria-label="Anterior">&#8592;</button>
        <button class="nav-btn" id="next" aria-label="Siguiente">&#8594;</button>
      </div>
    </div>
    <div class="carrusel-pista-wrap">
      <div class="carrusel-pista" id="pista">

        <div class="slide" onclick="location.href='historias/voces/index.html'">
          <div class="slide-portada">
            <img src="historias/voces/imagenes/VocesPH.png" alt="VOCES">
          </div>
          <p class="slide-titulo">VOCES</p>
          <span class="slide-tag">Terror · Sci-fi</span>
        </div>

        <div class="slide" onclick="location.href='historias/cenizas/index.html'">
          <div class="slide-portada">Portada</div>
          <p class="slide-titulo">Yarbatashy</p>
          <span class="slide-tag">Fantasía épica</span>
        </div>

        <!-- PLANTILLA SLIDE:
        <div class="slide" onclick="location.href='historias/tu-historia/index.html'">
          <div class="slide-portada">
            <img src="historias/tu-historia/imagenes/portada.jpg" alt="Título">
          </div>
          <p class="slide-titulo">Título</p>
          <span class="slide-tag">Género</span>
        </div>
        -->

      </div>
    </div>
    <div class="carrusel-dots" id="dots"></div>
  </section>

  <section class="sagas-wrap" id="sagas" style="display:none">
    <div class="saga-tabs-bar" id="saga-tabs"></div>
    <div class="sagas-body">
      <div class="saga-portada-wrap">
        <div class="saga-portada-bg" id="saga-bg"></div>
        <div class="saga-portada-overlay"></div>
        <div class="saga-portada-info" id="saga-nombre"></div>
      </div>
      <div class="saga-historias-outer">
        <button class="saga-flecha" id="saga-prev">&#8592;</button>
        <div class="saga-historias-pista-wrap">
          <div class="saga-historias-pista" id="saga-historias"></div>
        </div>
        <button class="saga-flecha" id="saga-next">&#8594;</button>
      </div>
    </div>
  </section>

  <!-- GÉNEROS -->
  <section class="generos-wrap">
    <p class="generos-label">Géneros</p>
    <div class="generos-lista">

      <div class="genero activo" data-genero="todos" onclick="filtrarGenero(this)">
        <div class="genero-icono">
          <!-- Con imagen: <img src="imagenes/generos/todos.png" alt="Todos"> -->
          <span class="genero-icono-emoji">📚</span>
        </div>
        <span class="genero-nombre">Todos</span>
      </div>

      <div class="genero" data-genero="terror" onclick="filtrarGenero(this)">
        <div class="genero-icono">
          <!-- Con imagen: <img src="imagenes/generos/terror.png" alt="Terror"> -->
          <span class="genero-icono-emoji">💀</span>
        </div>
        <span class="genero-nombre">Terror</span>
      </div>

      <div class="genero" data-genero="sci-fi" onclick="filtrarGenero(this)">
        <div class="genero-icono">
          <!-- Con imagen: <img src="imagenes/generos/scifi.png" alt="Sci-fi"> -->
          <span class="genero-icono-emoji">🛸</span>
        </div>
        <span class="genero-nombre">Sci-fi</span>
      </div>

      <div class="genero" data-genero="fantasia" onclick="filtrarGenero(this)">
        <div class="genero-icono">
          <span class="genero-icono-emoji">⚔</span>
        </div>
        <span class="genero-nombre">Fantasía</span>
      </div>

      <!-- PLANTILLA — copia para agregar más géneros:
      <div class="genero" data-genero="nombre-genero" onclick="filtrarGenero(this)">
        <div class="genero-icono">
          <img src="imagenes/generos/nombre.png" alt="Género">
        </div>
        <span class="genero-nombre">Nombre</span>
      </div>
      -->

    </div>
  </section>

  <section class="extension" id="historias">
    <p class="ext-label">Todas las historias</p>
    <p class="sin-resultados" id="sin-resultados">No hay historias en este género todavía.</p>
    <div class="grid" id="grid-historias">

      <a href="historias/voces/index.html" class="tarjeta" data-generos="terror sci-fi">
        <div class="tarjeta-portada">
          <img src="historias/voces/imagenes/VocesPH.png" alt="VOCES">
        </div>
        <div class="tarjeta-info">
          <p class="tarjeta-titulo">VOCES</p>
          <div class="tarjeta-meta">
            <span class="tag">Terror · Sci-fi</span>
            <span class="nueva">Nueva</span>
          </div>
        </div>
      </a>

      <!-- PLANTILLA TARJETA:
      <a href="historias/tu-historia/index.html" class="tarjeta">
        <div class="tarjeta-portada">
          <img src="historias/tu-historia/imagenes/portada.jpg" alt="Título">
        </div>
        <div class="tarjeta-info">
          <p class="tarjeta-titulo">Título</p>
          <div class="tarjeta-meta">
            <span class="tag">Género</span>
            <span class="estado">Cap. 1</span>
          </div>
        </div>
      </a>

      <div class="tarjeta vacia">
        <div>
          <div class="vacia-icono">+</div>
          <p class="vacia-texto">Nueva historia</p>
        </div>
      </div>
      -->

    </div>
  </section>

  <footer class="pie">
    <p>Edita el HTML para agregar tus historias · <a href="https://pages.github.com" target="_blank" style="color:inherit">GitHub Pages</a></p>
  </footer>

  <script src="script.js"></script>
  <script src="sagas.js"></script>
</body>
</html>
