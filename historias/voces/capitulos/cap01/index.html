  <script>
/* ---- PROGRESO ---- */
window.addEventListener('scroll', actualizarProgreso);
function actualizarProgreso() {
  const lector = document.getElementById('lector');
  const wrap = document.getElementById('lector-wrap');
  const enFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
  
  let scroll, total;
  if (enFS) {
    scroll = wrap.scrollTop;
    total = wrap.scrollHeight - wrap.clientHeight;
  } else {
    total = lector.offsetHeight - window.innerHeight;
    scroll = Math.max(0, window.scrollY - lector.offsetTop);
  }
  const pct = Math.min(100, (scroll / Math.max(1, total)) * 100);
  document.getElementById('progreso').style.width = pct + '%';
}

// Escuchar scroll tanto del window como del wrap
window.addEventListener('scroll', actualizarProgreso);
document.getElementById('lector-wrap').addEventListener('scroll', actualizarProgreso);

  /* ---- PANTALLA COMPLETA (Fullscreen API) ---- */
  let fsActivo = false;
  let timerFS;

  function entrarFS() {
    const wrap = document.getElementById('lector-wrap');
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    else if (wrap.mozRequestFullScreen) wrap.mozRequestFullScreen();
  }

  function salirFS() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
  }

  document.addEventListener('fullscreenchange', manejarCambioFS);
  document.addEventListener('webkitfullscreenchange', manejarCambioFS);

  function manejarCambioFS() {
    fsActivo = !!(document.fullscreenElement || document.webkitFullscreenElement);
    const barraFS = document.getElementById('barra-fs');
    const barraNormal = document.getElementById('barra-normal');

    if (fsActivo) {
      barraFS.classList.add('visible');
      barraNormal.style.display = 'none';
      activarAutoOcultar();
    } else {
      barraFS.classList.remove('visible');
      barraFS.classList.remove('oculta');
      barraNormal.style.display = '';
      clearTimeout(timerFS);
    }
  }

  function activarAutoOcultar() {
    const barraFS = document.getElementById('barra-fs');
    const wrap = document.getElementById('lector-wrap');
    function mostrar() {
      barraFS.classList.remove('oculta');
      clearTimeout(timerFS);
      timerFS = setTimeout(() => { if (fsActivo) barraFS.classList.add('oculta'); }, 2500);
    }
    wrap.addEventListener('mousemove', mostrar);
    wrap.addEventListener('scroll', mostrar);
    mostrar();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && fsActivo) salirFS();
  });
  </script>
